name: Publish

on:
  push:
    tags: ["v*"]
  repository_dispatch:
    types: [new-tag-created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: ./.github/actions/setup

      - run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
